<div class="min-h-screen" style="background:linear-gradient(180deg,#0f172a 0%,#0b1120 50%,#0f172a 100%)">

<!-- HERO -->

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-14">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center text-xs font-bold text-white">X</div>
        <h1 class="text-base font-semibold text-white tracking-tight">X-VLA Model Lab</h1>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">

<!-- BEST MODEL BANNER -->
<section id="bestBanner" class="anim-in anim-in-d1"></section>

<!-- TIMELINE -->
<section id="timelineSection" class="bg-slate-900/50 border border-slate-800/60 rounded-xl p-4 sm:p-5 anim-in anim-in-d2">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Research Trajectory</h2>

      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-sky-400"></span>abs</span>
      <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded border border-slate-500"></span>planned</span>
    </div>
  </div>
  <div id="timelineTrack" class="overflow-x-auto pb-1" style="scrollbar-width:thin"></div>
</section>

<!-- FILTERS -->
<section class="bg-slate-900/50 border border-slate-800/60 rounded-xl p-3 sm:p-4 anim-in anim-in-d3">
  <div class="flex flex-wrap items-center gap-2">
    <select id="encFilter" class="text-xs bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-slate-300 outline-none focus:border-slate-500"><option value="all">All Enc</option><option value="delta">Delta</option><option value="absolute">Absolute</option></select>
    <select id="archFilter" class="text-xs bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-slate-300 outline-none focus:border-slate-500"><option value="all">All Arch</option><option value="peft">LoRA</option><option value="full">Full FT</option></select>
    <select id="dataFilter" class="text-xs bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-slate-300 outline-none focus:border-slate-500"><option value="all">All Data</option><option value="full">Full</option><option value="sub">Sub</option></select>
    <select id="statusFilter" class="text-xs bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-slate-300 outline-none focus:border-slate-500"><option value="all">All Status</option><option value="trained">Trained</option><option value="training">Training</option><option value="planned">Planned</option><option value="failed">Failed</option></select>
    <select id="lrFilter" class="text-xs bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-slate-300 outline-none focus:border-slate-500"><option value="all">All LR</option><option value="5e-4">5e-4</option><option value="1e-4">1e-4</option></select>
    <select id="bsFilter" class="text-xs bg-slate-800 border border-slate-700 rounded-lg px-2.5 py-1.5 text-slate-300 outline-none focus:border-slate-500"><option value="all">All BS</option><option value="1">BS=1</option><option value="2">BS=2</option></select>
    <div class="relative flex-1 min-w-[140px]">
      <input id="searchInput" type="text" placeholder="Search models..." class="w-full text-xs bg-slate-800 border border-slate-700 rounded-lg pl-7 pr-2.5 py-1.5 text-slate-300 outline-none focus:border-slate-500 placeholder:text-slate-600">

    </div>
    <span id="resultCount" class="text-[10px] text-slate-600 font-mono ml-auto"></span>
  </div>
  <!-- Advanced Filters Toggle -->
  <div class="mt-2 pt-2 border-t border-slate-800/40">
    <button onclick="toggleAdvanced()" class="text-[10px] text-slate-500 hover:text-slate-300 transition-colors flex items-center gap-1">
      <span id="advToggle">▸</span> Advanced Filters
    </button>
    <div id="advancedFilters" class="hidden mt-2 flex flex-wrap gap-2"></div>
  </div>
</section>

<script>
function toggleAdvanced() {
  const el=document.getElementById('advancedFilters');
  const tg=document.getElementById('advToggle');
  el.classList.toggle('hidden');
  tg.textContent=el.classList.contains('hidden')?'▸':'▾';
}
// Build advanced filter dropdowns from all hyperparams
function buildAdvancedFilters() {
  const models=MODELS_DATA.models;
  const hpKeys=new Set();
  models.forEach(m=>Object.keys(m.hyperparams).forEach(k=>{
    if(['output_dir','train_metas_path','val_metas_path','models','log_interval','betas','betas'].includes(k)) return;
    hpKeys.add(k);
  }));
  const containers=document.getElementById('advancedFilters');
  hpKeys.forEach(key=>{
    const vals=new Set();
    models.forEach(m=>{const v=m.hyperparams[key]; if(v!=null&&v!=='') vals.add(typeof v==='boolean'?v:String(v));});
    if(vals.size<2) return; // skip single-value params
    const sorted=[...vals].sort();
    const id='adv_'+key;
    state.filters[id]='all';
    let html=`<select id="${id}" class="text-[10px] bg-slate-800 border border-slate-700 rounded-lg px-2 py-1 text-slate-400 outline-none focus:border-slate-500"><option value="all">${key}</option>`;
    sorted.forEach(v=>{html+=`<option value="${v}">${v}</option>`;});
    html+=`</select>`;
    containers.innerHTML+=html;
    document.getElementById(id).addEventListener('change',()=>{state.filters[id]=document.getElementById(id).value;rerender();});
  });
}
</script>

<!-- TABLE -->
<section class="bg-slate-900/50 border border-slate-800/60 rounded-xl overflow-hidden anim-in anim-in-d4">

  if(hp.warmup_steps||hp.freeze_steps) lines.push('warmup: '+(hp.warmup_steps||0)+' freeze: '+(hp.freeze_steps||0));
  if(hp.lora_r) lines.push('LoRA r: '+hp.lora_r+' alpha: '+(hp.lora_alpha||'16'));
  if(hp.num_actions) lines.push('chunk: '+hp.num_actions);
  if(hp.weight_decay) lines.push('wd: '+hp.weight_decay);
  if(hp.max_grad_norm) lines.push('clip: '+hp.max_grad_norm);
  if(hp.vlm_lr) lines.push('vlm_lr: '+hp.vlm_lr);
  if(hp.head_lr) lines.push('head_lr: '+hp.head_lr);
  if(hp.freeze_vlm) lines.push('freeze_vlm: true');
  return lines.join(' | ')||'';
}
function getTags(m) {
  const t=[],id=m.id;
  if(id.includes('r32')) t.push('r32'); if(id.includes('velmode')) t.push('vel'); if(id.includes('jointlr')) t.push('jointlr');
  if(id.includes('short8')) t.push('chunk=8'); if(id.includes('continued')) t.push('cont.'); if(id.includes('2stage')) t.push('2-stage');
  if(m.hyperparams.learning_coef&&m.hyperparams.learning_coef!==1.0) t.push('coef='+m.hyperparams.learning_coef);
  if(m.hyperparams.num_actions&&m.hyperparams.num_actions!==30) t.push('chunk='+m.hyperparams.num_actions);
  return t;
}

// ═══ FILTER + SORT ═══
function getFiltered() {
  const f=state.filters; const s=state.sort;
  let models=[...MODELS_DATA.models];
  if(f.encoding!=='all') models=models.filter(m=>m.action_encoding===f.encoding);
  if(f.arch!=='all') models=models.filter(m=>m.mode===f.arch);
  if(f.data!=='all') models=models.filter(m=>getDataTag(m)===f.data);
  if(f.status!=='all') models=models.filter(m=>getStatus(m)===f.status);
  if(f.lr!=='all') models=models.filter(m=>m.hyperparams.learning_rate&&Number(m.hyperparams.learning_rate).toExponential(1).replace('e-0','e-')===f.lr);
  if(f.bs!=='all') models=models.filter(m=>m.hyperparams.batch_size===parseInt(f.bs));
  // Advanced filters (dynamic hyperparams)
  Object.keys(f).forEach(k=>{
    if(!k.startsWith('adv_')) return;
    const val=f[k]; if(val==='all') return;
    const hpKey=k.replace('adv_','');
    models=models.filter(m=>{
      const mv=m.hyperparams[hpKey];
      if(mv===undefined||mv===null) return false;
      return String(mv)===val;
    });
  });
  if(f.search) models=models.filter(m=>m.id.toLowerCase().includes(f.search));
  models.sort((a,b)=>{ let va,vb;
    switch(s.key) {
      case'id': va=getEpoch(a); vb=getEpoch(b); break;
      case'arch': va=getArch(a); vb=getArch(b); break;
      case'encoding': va=a.action_encoding; vb=b.action_encoding; break;
      case'data': va=getDataTag(a); vb=getDataTag(b); break;
      case'schedule': va=getSchedule(a); vb=getSchedule(b); break;
      case'tags': va=getTags(a).length; vb=getTags(b).length; break;
      case'chunk': va=getChunk(a)||999; vb=getChunk(b)||999; break;
      case'loss': va=a.best_eval?a.best_eval.pos:999; vb=b.best_eval?b.best_eval.pos:999; break;
      case'rot': va=a.best_eval?a.best_eval.rot:999; vb=b.best_eval?b.best_eval.rot:999; break;
      case'score': va=a.registry_score||'~'; vb=b.registry_score||'~'; break;
      case'ckpts': va=a.checkpoints.length; vb=b.checkpoints.length; break;
      case'status': va=['planned','training','trained','failed'].indexOf(getStatus(a)); vb=['planned','training','trained','failed'].indexOf(getStatus(b)); break;
      default: va=getEpoch(a); vb=getEpoch(b);
    }
    if(typeof va==='string') return s.asc?va.localeCompare(vb):vb.localeCompare(va);
    return s.asc?va-vb:vb-va;
  });
  return models;
}

function resetFilters() {
  state.filters={encoding:'all',arch:'all',data:'all',status:'all',lr:'all',bs:'all',search:''};
  document.getElementById('encFilter').value='all'; document.getElementById('archFilter').value='all';

}

// ═══ TIMELINE ═══
function renderTimeline(models) {
  const all=MODELS_DATA.models;
  if(!all.length){ document.getElementById('timelineTrack').innerHTML='<div class="text-slate-600 text-xs py-4 text-center">No models</div>'; return; }
  const maxV=Math.max(...all.map(m=>getEpoch(m)));
  let html='<div class="flex items-end gap-0 min-w-[500px]" style="position:relative">';
  // Arrows
  html+='<svg class="absolute inset-0 w-full h-full pointer-events-none" style="height:60px" viewBox="0 0 100 60" preserveAspectRatio="none">';
  all.forEach(m=>{ if(m.supersedes){ const t=all.find(x=>x.id===m.supersedes); if(t){ const si=getEpoch(t),ei=getEpoch(m); if(si&&ei){
    const x1=(si-1)/(maxV-1||1)*100,x2=(ei-1)/(maxV-1||1)*100;
    html+=`<path d="M${x1} 48 C${(x1+x2)/2} 20,${(x1+x2)/2} 20,${x2} 48" fill="none" stroke="#334155" stroke-width="1.5" class="timeline-edge"/>`;
  }}}});
  html+='</svg>';
  // Nodes
  all.sort((a,b)=>getEpoch(a)-getEpoch(b)).forEach(m=>{
    const v=getEpoch(m); const st=getStatus(m); const enc=m.action_encoding;
    const color=m.best_eval?'#34d399':enc==='delta'?'#34d399':'#38bdf8';
    const isBest=m.best_eval&&m.best_eval.pos===Math.min(...all.filter(x=>x.best_eval).map(x=>x.best_eval.pos));
    const isDead=st==='failed'; const isFuture=st==='planned';
    html+=`<div class="flex flex-col items-center flex-1 min-w-0 timeline-node relative" style="animation-delay:${v*0.05}s">`;
    if(m.supersedes||m.superseded_by) html+=`<div class="text-[9px] text-slate-600 mb-0.5 truncate max-w-full">${m.supersedes?'←':'→'}</div>`;
    html+=`<div class="relative"><div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold cursor-pointer transition-all hover:scale-125" style="background:${isFuture?'transparent':color+'30'};border:2px solid ${isDead?'#f43f5e':color};${isBest?'animation:pulse-glow 2s infinite;':''}color:${isDead?'#f43f5e':color}" title="${m.id}">${isFuture?'○':isDead?'✕':isBest?'★':v}</div></div>`;
    html+=`<div class="text-[9px] text-slate-500 mt-1 truncate max-w-full ${isBest?'text-emerald-400 font-medium':''}">${m.id.replace('lora-','').replace('fullft-','').replace('full-','').replace('abs','').replace('delta','').replace(/-/g,' ').trim().split('-')[0]}</div>`;
    html+=`<div class="flex gap-0.5 mt-0.5"><span class="w-2 h-0.5 rounded-full ${enc==='delta'?'bg-emerald-500/50':'bg-sky-500/50'}"></span>${m.registry_data==='sub'?'<span class="w-1.5 h-0.5 rounded-full bg-amber-500/50"></span>':''}</div>`;
    html+=`</div>`;
  });
  html+='</div>';
  document.getElementById('timelineTrack').innerHTML=html;
}

    Object.keys(groups).forEach(k=>{const g=groups[k]; means[k]=g.length?g.reduce((s,m)=>s+m.best_eval.pos,0)/g.length:0;});
    charts.encoding=new Chart(encCtx,{type:'bar',data:{labels,datasets:[
      {label:'Pos Loss',data:labels.map(l=>{const g=groups[l==='Absolute'?'absolute':'delta']; return g.length?g.reduce((s,m)=>Math.min(s,m.best_eval.pos),Infinity):null;}),backgroundColor:['rgba(56,189,248,0.7)','rgba(52,211,153,0.7)'],borderRadius:3},
    ]},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'best pos='+ctx.raw}}},
      scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e293b'}},y:{beginAtZero:true,ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'},title:{display:true,text:'Pos Loss',color:'#64748b',font:{size:9}}}}
    }});
  }

  // Chart 2: Method Impact
  const metCtx=document.getElementById('chartMethod');
  if(metCtx){
    const groups={'LoRA r=8':[],'LoRA r=32':[],'Full FT':[]};
    hasEval.forEach(m=>{
      const r=m.hyperparams.lora_r||8; const mode=m.mode;
      if(mode==='full') groups['Full FT'].push(m);
      else if(r<=8) groups['LoRA r=8'].push(m);
      else groups['LoRA r=32'].push(m);
    });
    const labels=Object.keys(groups).filter(k=>groups[k].length>0);
    const colors=['#34d399','#38bdf8','#a78bfa'].slice(0,labels.length);
    charts.method=new Chart(metCtx,{type:'bar',data:{labels,datasets:[{
      label:'Best Pos Loss',data:labels.map(l=>groups[l].length?Math.min(...groups[l].map(m=>m.best_eval.pos)):null),
      backgroundColor:colors,borderRadius:3
    }]},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e293b'}},y:{beginAtZero:true,ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'},title:{display:true,text:'Pos Loss',color:'#64748b',font:{size:9}}}}
    }});
  }

  // Chart 3: Data Impact
  const datCtx=document.getElementById('chartData');
  if(datCtx){
    const full=hasEval.filter(m=>getDataTag(m)==='full'); const sub=hasEval.filter(m=>getDataTag(m)==='sub');
    const fullData=full.map(m=>({x:0+Math.random()*0.2-0.1,y:m.best_eval.pos,id:m.id,enc:m.action_encoding}));
    const subData=sub.map(m=>({x:1+Math.random()*0.2-0.1,y:m.best_eval.pos,id:m.id,enc:m.action_encoding}));
    charts.data=new Chart(datCtx,{type:'scatter',data:{datasets:[
      {label:'Full',data:fullData,backgroundColor:'rgba(52,211,153,0.7)',pointRadius:5},
      {label:'Sub',data:subData,backgroundColor:'rgba(56,189,248,0.7)',pointRadius:5}
    ]},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:10},boxWidth:10,padding:8}}},
      scales:{x:{type:'linear',min:-0.5,max:1.5,ticks:{callback:v=>v<0.5?'Full':'Sub',color:'#64748b',font:{size:10}},grid:{display:false}},
               y:{beginAtZero:true,ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'},title:{display:true,text:'Pos Loss',color:'#64748b',font:{size:9}}}}
    }});
  }

  // Chart 4: Training Dynamics
  const dynCtx=document.getElementById('chartDynamics');
  if(dynCtx){
    const pts=hasEval.filter(m=>m.hyperparams.iters).map(m=>({x:m.hyperparams.iters,y:m.best_eval.pos,id:m.id,enc:m.action_encoding,ckts:m.checkpoints.length}));
    charts.dynamics=new Chart(dynCtx,{type:'scatter',data:{datasets:[{
      label:'Models',data:pts,backgroundColor:pts.map(p=>p.enc==='delta'?'rgba(52,211,153,0.7)':'rgba(56,189,248,0.7)'),
      pointRadius:pts.map(p=>Math.min(8,3+p.ckts/5)),pointHoverRadius:8
    }]},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const p=pts[ctx.dataIndex]; return p.id+': '+p.y+' ('+p.ckts+' ckpts)';}}}},
      scales:{x:{title:{display:true,text:'Training Steps',color:'#64748b',font:{size:9}},ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'}},
              y:{beginAtZero:true,ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'},title:{display:true,text:'Pos Loss',color:'#64748b',font:{size:9}}}}
    }});
  }
}

// ═══ EVAL CURVES ═══
function renderEvalCurves(filteredModels) {
  const models=filteredModels||getFiltered();
  if(charts.evalCurves) charts.evalCurves.destroy();

  const ctx=document.getElementById('chartEvalCurves');
  if(!ctx) return;
  const logScale=document.getElementById('logScale')?.checked;
  const bestOnly=document.getElementById('showBestOnly')?.checked;
  const bestPos=Math.min(...models.filter(m=>m.best_eval).map(m=>m.best_eval.pos),Infinity);

  let withEval=models.filter(m=>m.all_eval_results.length>=3);
  if(bestOnly) withEval=withEval.filter(m=>m.best_eval&&m.best_eval.pos===bestPos);

  const chartColors=['#38bdf8','#34d399','#fbbf24','#a78bfa','#f472b6','#fb923c','#2dd4bf','#a3e635','#c084fc','#f43f5e','#eab308'];
  const datasets=withEval.map((m,i)=>{
    const isBest=m.best_eval&&m.best_eval.pos===bestPos;
    return {
      label: m.id, data: m.all_eval_results.map(e=>({x:e.step,y:e.pos})).sort((a,b)=>a.x-b.x),
      backgroundColor: chartColors[i%chartColors.length],
      borderColor: chartColors[i%chartColors.length],
      pointRadius: isBest?2.5:1, pointHoverRadius: 5,
      borderWidth: isBest?2:1, tension: 0.15, fill: false, showLine: true,
      hidden: !isBest && bestOnly,
    };
  });

  charts.evalCurves=new Chart(ctx,{type:'scatter',data:{datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:9},boxWidth:10,padding:6,usePointStyle:true}},
    },
    scales:{
      x:{title:{display:true,text:'Training Steps',color:'#64748b',font:{size:10}}, ticks:{color:'#64748b',font:{size:9}}, grid:{color:'#1e293b'}},
      y:{type:logScale?'logarithmic':'linear', title:{display:true,text:'Pos Loss',color:'#64748b',font:{size:10}}, ticks:{color:'#64748b',font:{size:9}}, grid:{color:'#1e293b'}, min:logScale?0.0001:0}
    },
    interaction:{mode:'index',intersect:false},
    hover:{mode:'index',intersect:false}
  }});
}

// ═══ EXPLORER ═══
function renderExplorer(models) {
  if(charts.explorer) charts.explorer.destroy();
  const ctx=document.getElementById('chartExplorer');
  if(!ctx) return;
  const xKey=document.getElementById('explorerX')?.value||'iters';
  const logX=document.getElementById('explorerLogX')?.checked;
  const pts=models.filter(m=>m.best_eval).map(m=>{
    const hp=m.hyperparams;
    let xVal=null;
    if(xKey==='learning_rate') xVal=hp.learning_rate;
    else if(xKey==='batch_size') xVal=hp.batch_size;
    else if(xKey==='num_actions') xVal=hp.num_actions;
    else xVal=hp[xKey];
    return xVal!=null?{x:xVal,y:m.best_eval.pos,id:m.id,enc:m.action_encoding}:null;
  }).filter(p=>p!=null).sort((a,b)=>a.x-b.x);
  if(!pts.length){ ctx.parentElement.innerHTML='<div class="text-slate-600 text-xs text-center py-8">No data for this parameter</div>'; return; }
  const trendN=pts.length>2?pts.length:0;
  const trendLine=trendN?{label:'trend',data:pts,type:'line',borderColor:'rgba(148,163,184,0.3)',borderWidth:1,pointRadius:0,tension:0.3,fill:false,showLine:true}:null;
  charts.explorer=new Chart(ctx,{type:'scatter',data:{datasets:[
    {label:'Models',data:pts,backgroundColor:pts.map(p=>p.enc==='delta'?'rgba(52,211,153,0.7)':'rgba(56,189,248,0.7)'),pointRadius:5,pointHoverRadius:7},
    ...(trendLine?[trendLine]:[]),
  ]},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const p=pts[ctx.dataIndex]; return p.id+': pos='+p.y;}}}},
    scales:{x:{type:logX?'logarithmic':'linear',title:{display:true,text:xKey,color:'#64748b',font:{size:10}},ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'}},
             y:{beginAtZero:true,title:{display:true,text:'Pos Loss',color:'#64748b',font:{size:10}},ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1e293b'}}}
  }});
}

// ═══ EVENT HANDLERS ═══
['encFilter','archFilter','dataFilter','statusFilter','lrFilter','bsFilter'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    const map={encFilter:'encoding',archFilter:'arch',dataFilter:'data',statusFilter:'status',lrFilter:'lr',bsFilter:'bs'};
    state.filters[map[id]]=document.getElementById(id).value;
    rerender();
  });
});
document.getElementById('searchInput').addEventListener('input',()=>{
  state.filters.search=document.getElementById('searchInput').value.toLowerCase();
  rerender();
});
document.getElementById('explorerX')?.addEventListener('change',()=>rerender());
document.getElementById('explorerLogX')?.addEventListener('change',()=>rerender());

// ═══ INIT ═══
buildAdvancedFilters();
document.fonts.ready.then(()=>rerender());
rerender();
</script>
